<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 원형 게이지 -->
  <circle cx="280" cy="315" r="140" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="16"/>
  <path d="M 280 175 A 140 140 0 1 1 170 410" fill="none" stroke="url(#accent)" stroke-width="16" stroke-linecap="round"/>
  <text x="280" y="335" font-family="-apple-system, system-ui, sans-serif" font-size="100" font-weight="900" fill="white" text-anchor="middle">?</text>

  <!-- 텍스트 -->
  <text x="600" y="210" font-family="-apple-system, system-ui, sans-serif" font-size="28" fill="rgba(255,255,255,0.5)" text-anchor="left">21문항 심리검사</text>
  <text x="600" y="290" font-family="-apple-system, system-ui, sans-serif" font-size="64" font-weight="900" fill="white">직장인 퇴사 판독기</text>
  <text x="600" y="360" font-family="-apple-system, system-ui, sans-serif" font-size="28" fill="rgba(255,255,255,0.6)">나는 소? 미어캣? 쿼카? 고슴도치? 철새?</text>
  <text x="600" y="420" font-family="-apple-system, system-ui, sans-serif" font-size="24" fill="rgba(255,255,255,0.4)">3축 분석으로 8가지 직장인 유형을 진단합니다</text>

  <!-- 하단 URL -->
  <text x="600" y="570" font-family="-apple-system, system-ui, sans-serif" font-size="22" fill="rgba(255,255,255,0.3)" text-anchor="left">quit-detector.vercel.app</text>
</svg>
